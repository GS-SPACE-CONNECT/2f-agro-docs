name: CI · Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown:
    name: Lint Markdown + Check Links
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Markdownlint (warning, não falha)
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
          config: |
            {
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false,
              "MD024": { "siblings_only": true }
            }

      - name: Verificar links quebrados
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: '--no-progress --max-concurrency 4 ./**/*.md'
          fail: false
